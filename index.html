<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para você ❤️</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #0b0510; /* Fundo roxo escuro */
    font-family: 'Courier New', Courier, monospace;
    user-select: none;
    touch-action: none; /* Bloqueia o arrastar da tela no iPhone */
  }

  /* O Canvas agora renderiza toda a chuva e o coração */
  #canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
  }

  /* O texto do meio continua sendo HTML para brilhar perfeitamente */
  #center-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    pointer-events: none;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .pulse-container {
    animation: heartBeat 4s ease-in-out infinite;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  @keyframes heartBeat {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); } 
    100% { transform: scale(1); }
  }

  .main-phrase {
    display: flex;
    align-items: center;
    gap: 1.5vmin;
  }

  .main-phrase h1 {
    font-size: 7vmin; 
    margin: 0;
    color: #ffffff;
    text-shadow: 0 0 10px #ffb3cc, 0 0 20px #ff6699, 0 0 30px #ff3366, 0 0 50px #ff0055;
    letter-spacing: 2px;
    font-weight: bold;
  }

  .main-phrase .emojis {
    font-size: 5.5vmin;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
  }

  .sub-phrase {
    font-size: 2.2vmin;
    margin-top: 2vmin;
    letter-spacing: 1.5px;
    color: #ffd9e6;
    text-shadow: 0 0 5px #ff6699;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="center-text">
  <div class="pulse-container">
    <div class="main-phrase">
      <h1>I love you </h1>
      <span class="emojis">💗</span>
    </div>
    <div class="sub-phrase">my heart keeps choosing you</div>
  </div>
</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { alpha: false }); // Otimização de performance
  
  let width, height, cx, cy, vmin;
  let dpr = window.devicePixelRatio || 1; // Para telas de iPhone (Retina) ficarem nítidas

  let mouseX = -1000;
  let mouseY = -1000;

  const heartParticles = [];
  const rainParticles = [];
  const TOTAL_HEART_PARTICLES = 800; // Dobro de partículas!
  const RAIN_DENSITY = 150; // Quantidade de itens caindo

  function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    cx = width / 2;
    cy = height / 2;
    vmin = Math.min(width, height) / 100;
    
    // Ajuste para alta resolução (iPhone)
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.scale(dpr, dpr);
    
    initHeart();
    initRain();
  }

  // ---- SISTEMA DO CORAÇÃO ----
  class HeartWord {
    constructor(index) {
      this.index = index;
      this.reset();
      this.angle = Math.random() * Math.PI * 2;
      this.speed = Math.random() * 0.015 + 0.005;
      this.repelX = 0;
      this.repelY = 0;
      this.fontSize = 1.4 * vmin;
    }

    reset() {
      const scale = 2.5 * vmin;
      const t = Math.PI * 2 * (this.index / TOTAL_HEART_PARTICLES);
      
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

      const thickness = 2 * vmin;
      const scatterX = (Math.random() - 0.5) * thickness;
      const scatterY = (Math.random() - 0.5) * thickness;
      
      this.baseX = cx + (x * scale) + scatterX;
      this.baseY = cy - (3 * vmin) + (y * scale) + scatterY;
    }

    update() {
      this.angle += this.speed;
      const floatX = Math.sin(this.angle) * (0.5 * vmin); 
      const floatY = Math.cos(this.angle) * (0.5 * vmin);

      const dx = this.baseX - mouseX;
      const dy = this.baseY - mouseY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      let targetRepelX = 0;
      let targetRepelY = 0;
      const radius = 18 * vmin; // Área do dedo

      this.isGlowing = false;

      if (dist < radius) {
        const force = (radius - dist) / radius;
        targetRepelX = (dx / dist) * force * (12 * vmin);
        targetRepelY = (dy / dist) * force * (12 * vmin);
        this.isGlowing = true;
      }

      this.repelX += (targetRepelX - this.repelX) * 0.1;
      this.repelY += (targetRepelY - this.repelY) * 0.1;

      this.x = this.baseX + floatX + this.repelX;
      this.y = this.baseY + floatY + this.repelY;
    }

    draw() {
      ctx.font = `${this.fontSize}px 'Courier New'`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (this.isGlowing) {
        ctx.fillStyle = '#ffffff';
        // ShadowBlur pesa muito. Usamos só quando o dedo tá perto
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ff3366';
      } else {
        ctx.fillStyle = 'rgba(232, 165, 184, 0.7)'; // Rosa claro com opacidade
        ctx.shadowBlur = 0;
      }
      
      ctx.fillText('I love you', this.x, this.y);
      ctx.shadowBlur = 0; // reseta
    }
  }

  // ---- SISTEMA DE CHUVA ----
  class RainDrop {
    constructor() {
      this.reset(true);
    }

    reset(randomY = false) {
      this.x = Math.random() * width;
      this.y = randomY ? Math.random() * height : -50;
      this.speed = Math.random() * 1.5 + 0.5;
      
      const rand = Math.random();
      if (rand > 0.8) {
        this.type = 'heart';
        this.size = Math.random() * 1.5 + 0.8;
        this.color = Math.random() > 0.5 ? '#ffb3c6' : '#ffffff';
      } else if (rand > 0.5) {
        this.type = 'dot';
        this.size = Math.random() * 1.5 + 0.5;
        this.color = Math.random() > 0.7 ? '#ffffff' : 'rgba(255, 179, 198, 0.5)';
      } else {
        this.type = 'line';
        this.height = Math.random() * 40 + 10;
        this.color = 'rgba(255, 179, 198, 0.2)';
      }
    }

    update() {
      this.y += this.speed;
      if (this.y > height + 50) {
        this.reset();
      }
    }

    draw() {
      if (this.type === 'heart') {
        ctx.font = `${this.size * vmin}px Arial`;
        ctx.fillStyle = this.color;
        ctx.fillText('♥', this.x, this.y);
      } else if (this.type === 'dot') {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * (vmin * 0.2), 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
      } else if (this.type === 'line') {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x, this.y + this.height);
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
  }

  function initHeart() {
    heartParticles.length = 0;
    for (let i = 0; i < TOTAL_HEART_PARTICLES; i++) {
      heartParticles.push(new HeartWord(i));
    }
  }

  function initRain() {
    rainParticles.length = 0;
    for (let i = 0; i < RAIN_DENSITY; i++) {
      rainParticles.push(new RainDrop());
    }
  }

  // ---- LOOP DE ANIMAÇÃO ----
  function animate() {
    // Pinta o fundo de roxo escuro a cada quadro
    ctx.fillStyle = '#0b0510';
    ctx.fillRect(0, 0, width, height);

    // Desenha a chuva primeiro (fundo)
    rainParticles.forEach(p => {
      p.update();
      p.draw();
    });

    // Desenha o coração por cima da chuva
    heartParticles.forEach(p => {
      p.update();
      p.draw();
    });

    requestAnimationFrame(animate);
  }

  // ---- CONTROLES DE TOQUE / MOUSE ----
  function updatePointer(e) {
    if (e.touches && e.touches.length > 0) {
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    } else {
      mouseX = e.clientX;
      mouseY = e.clientY;
    }
  }

  function resetPointer() {
    mouseX = -1000;
    mouseY = -1000;
  }

  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', updatePointer);
  window.addEventListener('mouseleave', resetPointer);
  
  // No celular, precisa do preventDefault para não arrastar a tela sem querer
  window.addEventListener('touchmove', (e) => {
    e.preventDefault();
    updatePointer(e);
  }, { passive: false });
  window.addEventListener('touchstart', updatePointer, { passive: false });
  window.addEventListener('touchend', resetPointer);

  // Inicia tudo
  resize();
  animate();
</script>
</body>
</html>
