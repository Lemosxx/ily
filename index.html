<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para você ❤️</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #0b0510; /* Fundo roxo espacial profundo */
    color: #ffb3c6;
    font-family: 'Courier New', Courier, monospace; 
    user-select: none;
    touch-action: none;
  }

  /* Cascata mágica (linhas, pontos e corações) */
  #rain-container {
    position: absolute;
    top: 0; left: 0; width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 1;
  }

  .rain-drop {
    position: absolute;
    color: #ffb3c6;
    opacity: 0;
    animation: fall linear infinite;
    text-shadow: 0 0 5px #ff6699;
  }

  /* Linhas verticais fracas para simular o rastro */
  .rain-line {
    position: absolute;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(255, 179, 198, 0.3), transparent);
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% { transform: translateY(-50px); opacity: 0; }
    10% { opacity: 0.8; }
    80% { opacity: 0.8; }
    100% { transform: translateY(105vh); opacity: 0; }
  }

  /* Contorno do Coração Principal */
  #heart-container {
    position: absolute;
    top: 0; left: 0; width: 100vw; height: 100vh;
    z-index: 5;
  }

  .particle {
    position: absolute;
    font-size: 1.4vmin; /* Tamanho delicado para caber muitos */
    white-space: nowrap;
    pointer-events: none;
    color: #e8a5b8;
    text-shadow: 0 0 3px #ff3366;
    transition: color 0.3s, text-shadow 0.3s, opacity 0.3s;
    opacity: 0.8;
  }

  /* Texto Central */
  #center-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    pointer-events: none;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .pulse-container {
    animation: heartBeat 4s ease-in-out infinite; /* Pulsação lenta e natural */
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  @keyframes heartBeat {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); } 
    100% { transform: scale(1); }
  }

  .main-phrase {
    display: flex;
    align-items: center;
    gap: 1.5vmin;
  }

  .main-phrase h1 {
    font-size: 7vmin; 
    margin: 0;
    color: #ffffff;
    text-shadow: 0 0 10px #ffb3cc, 0 0 20px #ff6699, 0 0 30px #ff3366, 0 0 50px #ff0055; /* Brilho intenso igual a foto */
    letter-spacing: 2px;
    font-weight: bold;
  }

  .main-phrase .emojis {
    font-size: 5.5vmin;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
  }

  .sub-phrase {
    font-size: 2.2vmin;
    margin-top: 2vmin;
    letter-spacing: 1.5px;
    color: #ffd9e6;
    text-shadow: 0 0 5px #ff6699;
  }

</style>
</head>
<body>

<div id="rain-container"></div>
<div id="heart-container"></div>

<div id="center-text">
  <div class="pulse-container">
    <div class="main-phrase">
      <h1>I love you</h1>
      <span class="emojis">🤍</span>
    </div>
    <div class="sub-phrase">my heart keeps choosing you</div>
  </div>
</div>

<script>
  let vmin = Math.min(window.innerWidth, window.innerHeight) / 100;
  let mouseX = -1000;
  let mouseY = -1000;
  const particles = [];

  // 1. Cria a cascata de fundo idêntica à foto (linhas, pontos e pequenos corações)
  function createRain() {
    const rainContainer = document.getElementById('rain-container');
    rainContainer.innerHTML = ''; // Limpa antes de recriar
    const columns = Math.floor(window.innerWidth / 30); // Uma coluna a cada ~30px

    for (let i = 0; i < columns; i++) {
      const xPos = Math.random() * 100; // Posição X em vw
      
      // Cria a linha de rastro
      if (Math.random() > 0.3) {
        const line = document.createElement('div');
        line.className = 'rain-line';
        line.style.left = `${xPos}vw`;
        line.style.height = `${Math.random() * 20 + 10}vh`;
        line.style.animationDuration = `${Math.random() * 5 + 5}s`;
        line.style.animationDelay = `${Math.random() * 5}s`;
        rainContainer.appendChild(line);
      }

      // Adiciona itens caindo na mesma coluna
      const itemsCount = Math.floor(Math.random() * 3) + 1;
      for (let j = 0; j < itemsCount; j++) {
        const item = document.createElement('div');
        item.className = 'rain-drop';
        item.style.left = `${xPos}vw`;
        
        // Decide se é um pontinho de luz ou um coração (como na imagem)
        const isHeart = Math.random() > 0.7;
        if (isHeart) {
          item.innerText = '♥';
          item.style.fontSize = `${Math.random() * 1 + 0.8}vmin`;
          item.style.color = Math.random() > 0.5 ? '#ffb3c6' : '#ffffff'; // Alguns corações brancos, outros rosas
        } else {
          item.innerText = '●'; // Ponto gordinho
          item.style.fontSize = `${Math.random() * 0.5 + 0.3}vmin`;
          if(Math.random() > 0.8) item.style.color = '#ffffff'; // Alguns pontos bem brilhantes
        }

        item.style.animationDuration = `${Math.random() * 6 + 4}s`;
        item.style.animationDelay = `${Math.random() * 5}s`;
        rainContainer.appendChild(item);
      }
    }
  }

  // 2. Desenha o coração principal EXATO
  function createHeart() {
    const heartContainer = document.getElementById('heart-container');
    heartContainer.innerHTML = '';
    particles.length = 0;

    vmin = Math.min(window.innerWidth, window.innerHeight) / 100;
    const scale = 2.4 * vmin;
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2 - (3 * vmin); 
    const numParticles = 450; // Mais partículas para preencher bem a borda

    for (let i = 0; i < numParticles; i++) {
      const t = Math.PI * 2 * (i / numParticles);
      // Equação exata do coração
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

      const el = document.createElement('div');
      el.className = 'particle';
      el.innerText = 'I love you';

      // Dispersão mínima, apenas para dar espessura, mantendo o formato rígido
      const thickness = 1.5 * vmin;
      const scatterX = (Math.random() - 0.5) * thickness;
      const scatterY = (Math.random() - 0.5) * thickness;
      
      const baseX = cx + (x * scale) + scatterX;
      const baseY = cy + (y * scale) + scatterY;

      el.style.left = baseX + 'px';
      el.style.top = baseY + 'px';

      heartContainer.appendChild(el);

      particles.push({
        el: el,
        baseX: baseX,
        baseY: baseY,
        angle: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.01 + 0.005, // Flutuação bem lenta
        repelX: 0,
        repelY: 0
      });
    }
  }

  // 3. Animação de flutuação e interatividade do mouse/dedo
  function animate() {
    particles.forEach(p => {
      p.angle += p.speed;
      
      const floatX = Math.sin(p.angle) * (0.4 * vmin); 
      const floatY = Math.cos(p.angle) * (0.4 * vmin);

      const dx = p.baseX - mouseX;
      const dy = p.baseY - mouseY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      let targetRepelX = 0;
      let targetRepelY = 0;
      const interactionRadius = 15 * vmin; 

      if (dist < interactionRadius) {
        const force = (interactionRadius - dist) / interactionRadius;
        targetRepelX = (dx / dist) * force * (10 * vmin); 
        targetRepelY = (dy / dist) * force * (10 * vmin);
        
        p.el.style.color = '#ffffff';
        p.el.style.textShadow = '0 0 10px #ffb3cc, 0 0 20px #ff6699';
        p.el.style.opacity = '1';
        p.el.style.zIndex = '10';
      } else {
        p.el.style.color = '#e8a5b8';
        p.el.style.textShadow = '0 0 3px #ff3366';
        p.el.style.opacity = '0.8';
        p.el.style.zIndex = '1';
      }

      p.repelX += (targetRepelX - p.repelX) * 0.1;
      p.repelY += (targetRepelY - p.repelY) * 0.1;

      p.el.style.transform = `translate(${floatX + p.repelX}px, ${floatY + p.repelY}px) translate(-50%, -50%)`;
    });
    requestAnimationFrame(animate);
  }

  // 4. Captura toques e mouse
  function updatePointer(e) {
    if (e.touches && e.touches.length > 0) {
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    } else {
      mouseX = e.clientX;
      mouseY = e.clientY;
    }
  }

  function resetPointer() {
    mouseX = -1000;
    mouseY = -1000;
  }

  document.addEventListener('mousemove', updatePointer);
  document.addEventListener('mouseleave', resetPointer);
  document.addEventListener('touchmove', updatePointer, { passive: false });
  document.addEventListener('touchstart', updatePointer, { passive: false });
  document.addEventListener('touchend', resetPointer);

  // Previne o zoom duplo ou scroll no iPhone ao tentar interagir
  document.body.addEventListener('touchmove', function(e) {
    e.preventDefault();
  }, { passive: false });

  window.onload = () => {
    createRain();
    createHeart();
    animate();
  };

  window.onresize = () => {
    createRain();
    createHeart();
  };
</script>
</body>
</html>
